project_name: scape-ctl

builds:
  - id: linux-amd64
    main: ./cmd/scape-ctl
    binary: scape-ctl
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=zig-cc-linux-amd64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: darwin-arm64
    main: ./cmd/scape-ctl
    binary: scape-ctl
    goos: [darwin]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=zig-cc-darwin-arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: windows-amd64
    main: ./cmd/scape-ctl
    binary: scape-ctl
    goos: [windows]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=zig-cc-windows-amd64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: unix
    builds: [linux-amd64, darwin-arm64]
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - config.example.toml
      - 50-fractal.rules

  - id: windows
    builds: [windows-amd64]
    format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - config.example.toml

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: charlietran
    name: scape-ctl
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"
