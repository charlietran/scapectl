name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build macOS (arm64)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o scape-ctl ./cmd/scape-ctl

          # Bundle as .app
          mkdir -p "ScapeControl.app/Contents/MacOS"
          mkdir -p "ScapeControl.app/Contents/Resources"
          mv scape-ctl "ScapeControl.app/Contents/MacOS/ScapeControl"
          cp README.md config.example.toml "ScapeControl.app/Contents/Resources/"

          cat > "ScapeControl.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Scape Control</string>
              <key>CFBundleDisplayName</key>
              <string>Scape Control</string>
              <key>CFBundleIdentifier</key>
              <string>com.charlietran.scape-ctl</string>
              <key>CFBundleVersion</key>
              <string>VERSION_PLACEHOLDER</string>
              <key>CFBundleShortVersionString</key>
              <string>VERSION_PLACEHOLDER</string>
              <key>CFBundleExecutable</key>
              <string>ScapeControl</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>NSHighResolutionCapable</key>
              <string>True</string>
              <key>LSUIElement</key>
              <string>1</string>
          </dict>
          </plist>
          PLIST

          sed -i '' "s/VERSION_PLACEHOLDER/${VERSION}/g" "ScapeControl.app/Contents/Info.plist"
          zip -r scape-ctl_darwin_arm64.zip "ScapeControl.app"

      - name: Build Linux (amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o scape-ctl_linux_amd64/scape-ctl ./cmd/scape-ctl
          cp README.md config.example.toml 50-fractal.rules scape-ctl_linux_amd64/
          tar -czf scape-ctl_linux_amd64.tar.gz scape-ctl_linux_amd64

      - name: Build Windows (amd64)
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags "-s -w -H windowsgui -X main.version=${{ steps.version.outputs.version }}" \
            -o scape-ctl_windows_amd64/ScapeControl.exe ./cmd/scape-ctl
          cp README.md config.example.toml scape-ctl_windows_amd64/
          cd scape-ctl_windows_amd64 && zip -r ../scape-ctl_windows_amd64.zip . && cd ..

      - name: Generate checksums
        run: shasum -a 256 *.tar.gz *.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
            checksums.txt
