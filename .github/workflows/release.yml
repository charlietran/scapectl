name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-dev libudev-dev libayatana-appindicator3-dev libgtk-3-dev

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Setup Zig CC wrappers
        run: |
          mkdir -p /tmp/zig-cc

          cat > /tmp/zig-cc/zig-cc-linux-amd64 << 'EOF'
          #!/bin/sh
          exec zig cc -target x86_64-linux-gnu "$@"
          EOF

          cat > /tmp/zig-cc/zig-cc-darwin-arm64 << 'EOF'
          #!/bin/sh
          exec zig cc -target aarch64-macos-none "$@"
          EOF

          cat > /tmp/zig-cc/zig-cc-windows-amd64 << 'EOF'
          #!/bin/sh
          exec zig cc -target x86_64-windows-gnu "$@"
          EOF

          chmod +x /tmp/zig-cc/*
          echo "/tmp/zig-cc" >> "$GITHUB_PATH"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
