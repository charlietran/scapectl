name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-dev libudev-dev

      - run: go vet ./...
      - run: go build -ldflags "-s -w" ./cmd/scape-ctl
