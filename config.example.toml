# scape-ctl configuration
# Location: ~/.config/scape-ctl/config.toml

[settings]
# How often to poll USB bus for device changes (milliseconds)
poll_interval_ms = 1000

# Show desktop notifications on connect/disconnect
notifications = true

# ── Trigger scripts ──────────────────────────────────
#
# Scripts run when device events occur. Each receives env vars:
#   SCAPE_EVENT     = "Connected" or "Disconnected"
#   SCAPE_DEVICE    = product name
#   SCAPE_VID       = vendor ID (hex, e.g. "36bc")
#   SCAPE_PID       = product ID (hex)
#   SCAPE_PATH      = OS device path
#   SCAPE_TIMESTAMP = ISO 8601
#   SCAPE_JSON      = full event as JSON

[[triggers]]
event   = "Connected"
script  = "notify-send 'Scape' 'Headset connected — $SCAPE_DEVICE'"
label   = "Connect notification"
enabled = true

[[triggers]]
event   = "Disconnected"
script  = "notify-send 'Scape' 'Headset disconnected'"
label   = "Disconnect notification"
enabled = true

# ── Examples ─────────────────────────────────────────

# Switch audio output when headset connects (PulseAudio)
# [[triggers]]
# event   = "Connected"
# script  = "pactl set-default-sink alsa_output.usb-Fractal_Design_Scape"
# label   = "Switch audio to Scape"
# enabled = false

# Run a script that logs session time
# [[triggers]]
# event   = "Connected"
# script  = "/home/user/scripts/scape-session-start.sh"
# label   = "Session logger"
# enabled = false

# Switch back to speakers when headset disconnects
# [[triggers]]
# event   = "Disconnected"
# script  = "pactl set-default-sink alsa_output.pci-0000_00_1f.3.analog-stereo"
# label   = "Switch to speakers"
# enabled = false
